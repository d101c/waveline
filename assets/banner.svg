<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="waveline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14161c"/>
      <stop offset="1" stop-color="#0c0d11"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5500"/>
      <stop offset="1" stop-color="#52A8C8"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <!-- forme d'onde centrale -->
  <path d="M0 200 Q 80 120 160 200 T 320 200 T 480 200 T 640 200 T 800 200 T 960 200 T 1120 200 T 1280 200"
        fill="none" stroke="url(#wave)" stroke-width="6" stroke-opacity="0.45"/>
  <!-- wordmark -->
  <text x="640" y="170" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="120" font-weight="700" fill="#E6E6E6" letter-spacing="2">waveline</text>
  <text x="640" y="232" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="30" fill="#8A8A8A">Mixcloud &amp; SoundCloud, dans ton terminal</text>
  <!-- mini barres de spectre -->
  <g fill="#FF5500">
    <rect x="392" y="250" width="10" height="26" rx="5"/>
    <rect x="408" y="238" width="10" height="38" rx="5"/>
    <rect x="424" y="220" width="10" height="56" rx="5"/>
  </g>
  <g fill="#52A8C8">
    <rect x="846" y="250" width="10" height="26" rx="5"/>
    <rect x="862" y="232" width="10" height="44" rx="5"/>
    <rect x="878" y="244" width="10" height="32" rx="5"/>
  </g>
</svg>
